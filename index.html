<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Hub - 实时协作聊天室</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            box-sizing: border-box; 
        }
        #chat-container { 
            width: 100%; 
            max-width: 900px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        #chat-header { 
            background: #10a37f; /* ChatGPT 风格绿 */
            color: white; 
            padding: 15px 20px; 
            font-weight: bold; 
            font-size: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        #status { 
            font-size: 13px; 
            background: #e04a4a; 
            padding: 4px 10px; 
            border-radius: 12px; 
        }
        #status.connected { 
            background: #0d8a6b; 
        }
        #messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #fafafa;
        }
        .message { 
            max-width: 85%; 
            display: flex; 
            flex-direction: column; 
        }
        .message.system { 
            align-self: center; 
            background: #e9ecef; 
            color: #666; 
            font-size: 12px; 
            padding: 5px 15px; 
            border-radius: 20px; 
        }
        .message.others { 
            align-self: flex-start; 
        }
        .message.me { 
            align-self: flex-end; 
        }
        .sender-name { 
            font-size: 12px; 
            color: #888; 
            margin-bottom: 4px; 
            margin-left: 2px; 
        }
        .message.me .sender-name { 
            text-align: right; 
            margin-right: 2px; 
        }
        .bubble { 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-size: 14px; 
            line-height: 1.6; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.others .bubble { 
            background: white; 
            color: #333; 
            border-top-left-radius: 4px; 
            border: 1px solid #eee;
        }
        .message.me .bubble { 
            background: #10a37f; 
            color: white; 
            border-top-right-radius: 4px; 
        }
        #input-area { 
            padding: 15px; 
            border-top: 1px solid #eee; 
            display: flex; 
            gap: 10px; 
            background: white; 
        }
        #message-input { 
            flex: 1; 
            padding: 12px 15px; 
            border: 1px solid #ccc; 
            border-radius: 24px; 
            outline: none; 
            font-size: 14px; 
            transition: border-color 0.2s;
        }
        #message-input:focus { 
            border-color: #10a37f; 
        }
        #send-btn { 
            background: #10a37f; 
            color: white; 
            border: none; 
            padding: 10px 24px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s;
        }
        #send-btn:hover { 
            background: #0d8a6b; 
        }
    </script>
    <style>
        /* 增加一个简单的 Markdown 样式（只是为了让代码块看起来更好） */
        .bubble code {
            background: #f4f4f4;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }
        .message.me .bubble code {
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <span>🚀 Agent Hub 协作大厅</span>
            <span id="status">未连接</span>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="输入你想对 Agents 说的话 (例如：@Hermes 帮我写一个测试)..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const myName = "人类指挥官";
        let commanderToken = null;
        let ws;

        function connect() {
            if (!commanderToken) {
                commanderToken = prompt("系统已开启安全防御，请输入终端显示的 8 位启动秘钥：");
                if (!commanderToken) {
                    document.getElementById('status').textContent = '未授权，无法连接';
                    return;
                }
            }
            
            ws = new WebSocket("ws://localhost:8765/ws");
            
            ws.onopen = () => {
                document.getElementById('status').textContent = '已连接 Hub';
                document.getElementById('status').className = 'connected';
                // 以人类身份加入握手，带上身份秘钥
                ws.send(JSON.stringify({ type: "join", name: myName, role: "User", token: commanderToken }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "broadcast") {
                    appendMessage(data.sender, data.content);
                }
            };

            ws.onclose = () => {
                document.getElementById('status').textContent = '已断开，正在重连...';
                document.getElementById('status').className = '';
                setTimeout(connect, 3000); // 断线自动重连
            };
        }

        function appendMessage(sender, content) {
            const msgsDiv = document.getElementById('messages');
            const msgEl = document.createElement('div');
            
            if (sender === "System") {
                msgEl.className = 'message system';
                msgEl.textContent = content;
            } else if (sender === myName) {
                msgEl.className = 'message me';
                msgEl.innerHTML = `<div class="sender-name">我</div><div class="bubble">${escapeHtml(content)}</div>`;
            } else {
                msgEl.className = 'message others';
                msgEl.innerHTML = `<div class="sender-name">${sender}</div><div class="bubble">${escapeHtml(content)}</div>`;
            }
            
            msgsDiv.appendChild(msgEl);
            // 自动滚动到底部
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (content && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "message", content: content, token: commanderToken }));
                input.value = '';
            }
        }

        // 简单的防止 HTML 注入，同时保留换行
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // 初始化连接
        connect();
    </script>
</body>
</html>
